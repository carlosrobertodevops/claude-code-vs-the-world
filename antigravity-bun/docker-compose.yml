
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lavaflow-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://aquaflow:aquaflow@db:5432/aquaflow?schema=public}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-secret}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password123}
    depends_on:
      - db
      - minio
    restart: unless-stopped
    # Para dev, podemos mapear o volume local para hot-reload
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    # command: bun run dev

  db:
    image: postgres:16-alpine
    container_name: lavaflow-db
    env_file:
      - .env
    environment:
      - POSTGRES_USER=aquaflow
      - POSTGRES_PASSWORD=aquaflow
      - POSTGRES_DB=aquaflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio
    container_name: lavaflow-minio
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

volumes:
  db_data:
  minio_data:
