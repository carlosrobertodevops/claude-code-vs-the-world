services:
  db:
    image: postgres:17
    container_name: brilhosaas-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-brilhosaas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: brilhosaas-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brilhosaas-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-brilhosaas}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/brilhosaas}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-brilhosaas_secret_placeholder}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-brilhosaas-uploads}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      PROJECT_NAME: ${PROJECT_NAME:-BrilhoSaaS}
    depends_on:
      - db
      - minio


volumes:
  postgres_data:
  minio_data:
