services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aquaflow
      POSTGRES_PASSWORD: aquaflow
      POSTGRES_DB: aquaflow
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://aquaflow:aquaflow@db:5432/aquaflow?schema=public}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      STORAGE_MODE: ${STORAGE_MODE:-s3}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT_DOCKER:-minio}
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-aquaflow}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-"false"}
    depends_on:
      db:
        condition: service_healthy
    # profiles:
    #   - production

volumes:
  pgdata:
  minio_data:
